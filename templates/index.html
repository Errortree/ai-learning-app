<!DOCTYPE html>
<html>
<head>
    <title>AI Learning Platform</title>
</head>
<body>

<h1>AI Personalized Learning Platform</h1>

<form action="/submit" method="POST">
    <input type="text" name="name" placeholder="Name" required><br><br>
    <input type="number" name="class_level" placeholder="Class Level" required><br><br>
    <input type="text" name="weak_subject" placeholder="Weak Subject" required><br><br>

    <select name="learning_style">
        <option>Videos</option>
        <option>Reading</option>
        <option>Practice</option>
    </select><br><br>

    <input type="text" name="goal" placeholder="Goal" required><br><br>

    <button type="submit">Get Recommendation</button>
</form>

</body>
</html>
